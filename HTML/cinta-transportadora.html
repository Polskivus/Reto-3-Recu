<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Reto-3-Recu/resources/CSS/animaciones2.css">
    <title>Cinta transportadora</title>
</head>

<body>
    <div class="zona-trabajo">
        <input type="text" name="numRobot" id="numRobot">
        <input type="submit" value="Robots que quieres que trabajen" onclick="robotPantalla()">
        <div class="zona-robots" style=" display: flex; justify-content: space-around;">
        </div>
    </div>


    <div class="contenedor-cinta">
        <div class="cinta-tren" id="cinta">
            <div id="pistaA" class="pista"></div>
            <div id="pistaB" class="pista"></div>
        </div>
    </div>

    <div class="zona-trabajo2" style="display: flex; align-items: center; padding: 10px; justify-content: space-around;"></div>

    <div class="contoles">
        <input type="button" value="Activar maquinaria" onclick="stopStart()" id="textoMaquina">
    </div>

    <!-- Aqui empiezan los scripts (parece un comentario echo por ia XD)-->
    <script>

        function cintaPantalla() {
            const pistaA = document.getElementById("pistaA");
            const pistaB = document.getElementById("pistaB");
            const anchoCinta = 100;

            pistaA.innerHTML = '';
            pistaB.innerHTML = '';

            const cantidad = Math.ceil(window.innerWidth / anchoCinta) + 1;

            const posicionItems = [];
            for (let i = 0; i < cantidad; i++) {
                posicionItems.push(Math.floor(Math.random() * 80));
                posicionItems.push(Math.floor(Math.random() * 80));
            }

            function construirPista(pistaDestino) {
                let indiceItem = 0;
                for (let i = 0; i < cantidad; i++) {
                    const img_cinta = document.createElement('img');
                    img_cinta.src = '/Reto-3-Recu/resources/img/cinta-transportadora.svg';
                    img_cinta.alt = 'cinta';
                    img_cinta.style.width = '100px';
                    pistaDestino.appendChild(img_cinta);

                    const posicionCinta = i * 100;

                    for (let j = 0; j < 2; j++) {
                        const item = document.createElement('img');
                        item.src = '/Reto-3-Recu/resources/img/ITEM4.svg';
                        item.alt = 'Item';
                        item.className = 'items';
                        item.style.top = Math.floor((Math.random() * 34)) + 'px';
                        item.style.left = (posicionCinta + posicionItems[indiceItem]) + 'px';
                        pistaDestino.appendChild(item);
                        indiceItem++;
                    }
                }
            }

            construirPista(pistaA);
            construirPista(pistaB);
        }
        cintaPantalla();
        window.addEventListener('resize', cintaPantalla);

        function robotPantalla() {
            const inputRobot = document.querySelector('#numRobot');
            const numRobot = parseInt(inputRobot.value);
            const zona = document.querySelector('.zona-robots');
            zona.innerHTML = '';

            for (let i = 0; i < numRobot; i++) {
                const img_robot = document.createElement('img');
                img_robot.src = '/Reto-3-Recu/resources/img/robot-icon.svg';
                img_robot.alt = 'Robot';
                img_robot.style.width = '50px';
                img_robot.style.height = '50px';
                zona.appendChild(img_robot);
            }
        }
        let cintaEstado = 0;
        function stopStart(){
            const cinta = document.getElementById("cinta");
            const boton = document.getElementById("textoMaquina");
            
            if (cintaEstado == 0){
                cinta.classList.add("cinta-activada");
                boton.value = "Apagar maquinaria";
                cintaEstado = 1;
            } else {
                cinta.classList.remove("cinta-activada");
                boton.value = "Activar maquinaria";
                cintaEstado = 0;
            }
        }
    </script>
</body>

</html>
