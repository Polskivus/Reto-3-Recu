<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brazo robotico</title>
    <style>
        
        @keyframes giro {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(30deg) translateX(-5%);
            }
        }

        .Brazo-completo {
            position: relative;
            width: 500px;
            height: 500px;
        }

        .Brazo-completo img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .fijo {
            z-index: 1;
        }

        .girable {
            z-index: 2;
            animation: giro 3000ms infinite alternate;
        }
    </style>
</head>
<body>
    <div class="Brazo-completo">
        <img class="fijo" src="/Reto-3-Recu/resources/img/Brazo-fijo.svg" alt="">
        <img class="girable" src="/Reto-3-Recu/resources/img/Brazo-girable.svg" alt="">
    </div>

    <div>
        <button><a href="index.html" style="text-decoration: none;">Echar para atras</a></button>
    </div>
</body>
</html>
